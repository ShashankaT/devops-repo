apiVersion: apps/v1
kind: Deployment
metadata:
  name: qualification
  namespace: east1
  labels:
    app: qualification
    environment: production
    region: east1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qualification
  template:
    metadata:
      labels:
        app: qualification
    spec:
      containers:
      - name: qualification
        image: myregistry/qualification:v1.0
        ports:
        - containerPort: 80
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: REGION
          value: "east1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: qualification-service
  namespace: east1
spec:
  selector:
    app: qualification
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
