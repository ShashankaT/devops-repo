apiVersion: apps/v1
kind: Deployment
metadata:
  name: hostrunner
  namespace: east2
  labels:
    app: hostrunner
    environment: production
    region: east2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hostrunner
  template:
    metadata:
      labels:
        app: hostrunner
    spec:
      containers:
      - name: hostrunner
        image: myregistry/hostrunner:v1.0
        ports:
        - containerPort: 80
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Dev"
        - name: REGION
          value: "east2"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: hostrunner-service
  namespace: east2
spec:
  selector:
    app: hostrunner
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
